name: Publish crates

on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: "Print publish order without publishing"
        type: boolean
        default: true
      start_at:
        description: "Optional crate name to resume from"
        type: string
        required: false
      skip_check:
        description: "Skip cargo check --workspace before publishing"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Show publish plan
        if: ${{ inputs.plan_only }}
        run: bash scripts/publish-crates.sh --plan

      - name: Ensure crates.io token is configured
        if: ${{ !inputs.plan_only }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is required for publishing." >&2
            exit 1
          fi

      - name: Publish crates
        if: ${{ !inputs.plan_only }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          START_AT: ${{ inputs.start_at }}
          SKIP_CHECK: ${{ inputs.skip_check }}
        run: |
          args=()
          if [ -n "$START_AT" ]; then
            args+=(--from "$START_AT")
          fi
          if [ "$SKIP_CHECK" = "true" ]; then
            args+=(--skip-check)
          fi
          bash scripts/publish-crates.sh "${args[@]}"
